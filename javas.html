<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <h1>operators</h1>
    <script>
        console.log("====operators====");
        let a=20;
        let b=30;
        
        console.log("Addition:",a+b);
        console.log("substraction:",a-b);
        console.log("Multiplication:",a*b);
        console.log("Division:",a/b);


        console.log(a>b);
        console.log(a<b);
        console.log(a==b);


        console.log(true&&false);
        console.log(true||false);
        console.log(true);

    </script>
</body>
